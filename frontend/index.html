<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FOOTBALL ORACLE // engine</title>
<link rel="icon" type="image/webp" href="/assets/favicon.webp"/>
<link rel="apple-touch-icon" href="/assets/app.webp"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  /* ============ TOKENS ============ */
  :root{
    --bg:#04060a; --bg-deep:#02030680;
    --panel:#0a0f14; --panel2:#0d141b; --panel3:#0f1820;
    --neon:#00ff9c; --neon-dim:#0bd181; --neon2:#00e0ff; --neon3:#7aff00;
    --warn:#ffb000; --warn-dim:#a07000;
    --bad:#ff3b5c; --bad-dim:#7a1a2a;
    --txt:#d4ffe9; --txt-dim:#88bba0; --dim:#3f6b5a; --line:rgba(0,255,156,.18);
    --shadow-soft:0 4px 20px rgba(0,255,156,.08);
    --shadow-glow:0 0 24px rgba(0,255,156,.35);
    --radius:8px; --radius-sm:5px;
    --t-fast:.15s ease; --t-mid:.25s cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'JetBrains Mono','Cascadia Code','Courier New',ui-monospace,monospace;
    background:radial-gradient(circle at 20% 0%,rgba(0,255,156,.05),transparent 50%),
               radial-gradient(circle at 80% 100%,rgba(0,224,255,.04),transparent 50%),
               var(--bg);
    color:var(--txt); padding:14px; min-height:100vh; overflow-x:hidden;
    background-image:linear-gradient(rgba(0,255,156,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,156,.035) 1px,transparent 1px);
    background-size:36px 36px,36px 36px,auto;
    background-attachment:fixed;
  }
  /* Scanline overlay – tinh tế hơn */
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:9;
    background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.18) 2px 3px);
    mix-blend-mode:multiply; opacity:.45;
  }
  /* Vignette quanh viewport */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:8;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%);
  }
  .wrap{max-width:1400px;margin:0 auto;position:relative;z-index:10}

  /* ============ HEADER ============ */
  header{
    border:1px solid var(--line);
    background:linear-gradient(135deg,rgba(0,255,156,.08) 0%,rgba(0,224,255,.04) 50%,transparent 100%);
    padding:18px 22px; border-radius:var(--radius); margin-bottom:16px;
    position:relative; overflow:hidden;
    box-shadow:var(--shadow-soft);
  }
  header::before{
    content:""; position:absolute; top:0; left:-100%; width:100%; height:2px;
    background:linear-gradient(90deg,transparent,var(--neon),var(--neon2),transparent);
    animation:scanLine 4s linear infinite;
  }
  @keyframes scanLine{0%{left:-100%}100%{left:100%}}
  .title{
    font-size:24px; font-weight:800; letter-spacing:3px; color:var(--neon);
    text-shadow:0 0 12px rgba(0,255,156,.7),0 0 24px rgba(0,255,156,.3);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .title b{color:var(--neon2);text-shadow:0 0 12px rgba(0,224,255,.7)}
  .title-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:10px; letter-spacing:2px; padding:3px 9px; border-radius:999px;
    background:rgba(255,59,92,.12); border:1px solid rgba(255,59,92,.4); color:var(--bad);
    text-shadow:none; font-weight:700;
  }
  .title-badge::before{content:"●";animation:blink 1.2s infinite}
  .sub{
    font-size:11px; color:var(--txt-dim); margin-top:6px; letter-spacing:1.5px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .sub-chip{
    display:inline-flex; align-items:center; gap:5px; padding:2px 8px;
    background:rgba(0,255,156,.06); border:1px solid rgba(0,255,156,.15);
    border-radius:3px; font-size:10px; color:var(--neon-dim);
  }
  .blink{animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  /* ============ CONTROLS ============ */
  .controls{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px;
    position:sticky; top:8px; z-index:20;
    padding:10px; background:rgba(10,15,20,.85); backdrop-filter:blur(10px);
    border:1px solid var(--line); border-radius:var(--radius);
  }
  button,select,input[type="text"]{
    font-family:inherit; background:var(--panel2); color:var(--neon);
    border:1px solid rgba(0,255,156,.3); padding:9px 14px;
    border-radius:var(--radius-sm); cursor:pointer; font-size:12.5px;
    letter-spacing:1.2px; font-weight:600; transition:var(--t-fast);
    position:relative; overflow:hidden;
  }
  button:hover,select:hover,input[type="text"]:focus{
    box-shadow:0 0 14px rgba(0,255,156,.35); border-color:var(--neon);
    transform:translateY(-1px);
  }
  button:active{transform:translateY(0)}
  button.active{
    background:linear-gradient(135deg,var(--neon),var(--neon3));
    color:#001a0e; font-weight:800; box-shadow:0 0 18px rgba(0,255,156,.6);
    border-color:var(--neon);
  }
  button.active::after{
    content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);
    transform:translateX(-100%); animation:shine 2.5s infinite;
  }
  @keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  select{padding-right:30px;background-image:linear-gradient(45deg,transparent 50%,var(--neon) 50%),linear-gradient(135deg,var(--neon) 50%,transparent 50%);
    background-position:calc(100% - 14px) 50%,calc(100% - 9px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;appearance:none}
  input[type="text"]{cursor:text;padding:9px 12px}
  input[type="text"]::placeholder{color:var(--dim)}
  .auto{font-size:11px;color:var(--neon-dim);letter-spacing:1px;display:flex;align-items:center;gap:5px}
  .auto::before{content:"⟳";animation:spin 2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ MATCH CARDS ============ */
  .match{
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
    border:1px solid var(--line); border-left:3px solid var(--neon);
    border-radius:var(--radius); padding:14px 16px; margin-bottom:12px;
    position:relative; transition:var(--t-mid);
  }
  .match:hover{
    border-color:rgba(0,255,156,.35); border-left-color:var(--neon);
    transform:translateX(2px); box-shadow:0 4px 16px rgba(0,255,156,.12);
  }
  .match::before{
    content:""; position:absolute; top:0; right:0; width:80px; height:100%;
    background:radial-gradient(ellipse at right,rgba(0,224,255,.05),transparent 70%);
    pointer-events:none;
  }
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}
  .league{
    font-size:10px; color:var(--neon-dim); letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:6px; font-weight:600;
  }
  .teams{
    display:flex; align-items:center; gap:10px; font-size:14.5px; font-weight:700;
    color:var(--txt); margin:2px 0;
  }
  .teams img{
    width:24px; height:24px; object-fit:contain;
    background:rgba(255,255,255,.04); border-radius:50%; padding:2px;
    box-shadow:0 0 0 1px rgba(0,255,156,.15);
  }
  .score{
    font-size:22px; font-weight:800; color:var(--neon2);
    text-shadow:0 0 10px rgba(0,224,255,.55);
    letter-spacing:1px;
  }
  .scan-btn{
    font-size:11.5px; padding:7px 14px; margin-top:8px;
    background:linear-gradient(135deg,rgba(0,255,156,.1),rgba(0,224,255,.06));
  }
  .scan-btn::before{content:"⚡ ";color:var(--warn)}
  .panel{
    margin-top:14px; border-top:1px dashed rgba(0,255,156,.3); padding-top:12px;
    display:none; animation:slideDown .35s ease;
  }
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .term{font-size:12px;line-height:1.85;white-space:pre-wrap;color:var(--neon);min-height:16px}

  /* ============ LAYOUT GRID ============ */
  .flex{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;margin-top:10px}
  .col{flex:1;min-width:220px}

  /* ============ DONUT CHART ============ */
  .donutbox{
    width:170px; height:170px; position:relative; margin:auto;
    padding:8px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,255,156,.04),transparent 70%);
  }
  .donutc{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
  .donutc b{font-size:22px;color:var(--neon);font-weight:800;letter-spacing:1px}
  .donutc span{font-size:10px;color:var(--neon-dim);letter-spacing:2px;margin-top:2px;font-weight:600}

  /* ============ STAT CELLS ============ */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .cell{
    background:linear-gradient(135deg,var(--panel2),var(--panel3));
    border:1px solid rgba(0,224,255,.2); border-radius:var(--radius-sm);
    padding:9px 11px; font-size:11px; transition:var(--t-fast);
    position:relative; overflow:hidden;
  }
  .cell:hover{border-color:rgba(0,224,255,.45);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,224,255,.1)}
  .cell .k{
    color:var(--txt-dim); letter-spacing:1.2px; font-size:10px;
    text-transform:uppercase; font-weight:600;
  }
  .cell .v{color:var(--neon2);font-size:14px;font-weight:800;margin-top:3px;letter-spacing:.5px}

  /* ============ HEATMAP ============ */
  .heat{display:grid;grid-template-columns:auto repeat(6,1fr);gap:3px;font-size:10px;margin-top:8px}
  .heat .hc{
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border-radius:4px; color:#011a0d; font-weight:800; font-size:10px;
    transition:var(--t-fast); cursor:default;
  }
  .heat .hc:hover{transform:scale(1.15);z-index:5;box-shadow:0 0 12px rgba(0,255,156,.6)}
  .heat .lbl{color:var(--neon-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

  /* ============ VERDICT PANEL ============ */
  .verdict{
    margin-top:14px;
    background:linear-gradient(135deg,rgba(0,255,156,.06),rgba(0,224,255,.03));
    border:1px solid rgba(0,255,156,.3); border-radius:var(--radius);
    padding:14px 16px; position:relative; overflow:hidden;
  }
  .verdict::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,var(--neon),transparent);
  }
  .vh{
    font-size:11px; color:var(--warn); letter-spacing:2.5px; margin-bottom:8px;
    font-weight:700; text-transform:uppercase;
  }
  .verdict ul{list-style:none}
  .verdict li{
    font-size:12.5px; padding:5px 0 5px 20px; position:relative; line-height:1.6;
    color:var(--txt);
  }
  .verdict li::before{
    content:"▸"; position:absolute; left:0; color:var(--neon);
    font-size:14px; top:3px;
  }

  /* ============ TAGS ============ */
  .tag{
    display:inline-block; font-size:10px; padding:3px 10px;
    border-radius:999px; letter-spacing:1.2px; font-weight:800; text-transform:uppercase;
  }
  .t-hi{background:linear-gradient(135deg,var(--neon),var(--neon3));color:#001a0e;box-shadow:0 0 12px rgba(0,255,156,.5)}
  .t-mid{background:linear-gradient(135deg,var(--warn),#ffd060);color:#1a1100}
  .t-lo{background:linear-gradient(135deg,var(--bad),#ff6b85);color:#fff}

  /* ============ EMPTY / ERROR ============ */
  .empty{
    color:var(--txt-dim); text-align:center; padding:40px 20px;
    font-size:13px; letter-spacing:1.5px; line-height:1.8;
  }
  .err{color:var(--bad)}

  /* ============ SCORE BOXES ============ */
  .scores{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .sbox{
    background:linear-gradient(180deg,#04140d,#02110a);
    border:1px solid rgba(0,255,156,.3); border-radius:var(--radius-sm);
    padding:6px 11px; font-size:12px; text-align:center;
    transition:var(--t-fast); min-width:56px;
  }
  .sbox:hover{transform:translateY(-2px);border-color:var(--neon)}
  .sbox b{color:var(--neon2);font-size:15px;font-weight:800;letter-spacing:1px}
  .sbox span{display:block;color:var(--neon-dim);font-size:9px;margin-top:2px;letter-spacing:1px}

  /* ============ ANIMATIONS ============ */
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 0 8px rgba(0,255,156,.4)}
    50%{box-shadow:0 0 24px rgba(0,255,156,.95),0 0 40px rgba(0,255,156,.3)}
  }
  @keyframes textFlash{
    0%,100%{opacity:1;text-shadow:0 0 14px rgba(0,255,156,.95)}
    50%{opacity:.5;text-shadow:none}
  }
  @keyframes borderRun{
    0%,100%{border-color:var(--neon)}
    50%{border-color:var(--neon2)}
  }
  .flash{animation:textFlash 1.1s steps(2,jump-none) infinite;color:var(--neon)!important;font-weight:700}
  .hot{
    animation:pulseGlow 1.3s ease-in-out infinite,borderRun 2.2s linear infinite;
    border:1px solid var(--neon)!important; border-radius:var(--radius-sm);
    padding:3px 8px; display:inline-block;
  }
  .sbox.top{
    border-color:var(--neon); animation:pulseGlow 1.4s ease-in-out infinite;
    background:linear-gradient(180deg,rgba(0,255,156,.12),rgba(0,255,156,.04));
  }
  .sbox.top b{color:var(--neon)}
  .donutbox.win{animation:pulseGlow 1.5s ease-in-out infinite;border-radius:50%}
  .match.hotmatch{
    border-left-color:var(--neon2); border-left-width:4px;
    animation:borderRun 2.4s linear infinite;
    box-shadow:0 0 18px rgba(0,224,255,.15);
  }

  /* ============ TABLES ============ */
  table{
    width:100%; border-collapse:collapse; font-size:12px;
    background:rgba(10,15,20,.4); border-radius:var(--radius-sm); overflow:hidden;
  }
  th,td{
    padding:8px 10px; text-align:center; border-bottom:1px solid rgba(0,255,156,.08);
  }
  th{
    color:var(--neon-dim); letter-spacing:1.5px; font-size:10px;
    text-transform:uppercase; font-weight:700;
    background:rgba(0,255,156,.04); padding-top:10px; padding-bottom:10px;
  }
  td.name{text-align:left;color:var(--txt)}
  tr{transition:var(--t-fast)}
  tbody tr:hover{background:rgba(0,255,156,.06)}
  tbody tr:last-child td{border-bottom:none}
  .rk{color:var(--neon2);font-weight:700}

  /* ============ BIG STATS ============ */
  .bigstat{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .bs{
    flex:1; min-width:150px;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid rgba(0,255,156,.25); border-radius:var(--radius);
    padding:18px 14px; text-align:center; position:relative; overflow:hidden;
    transition:var(--t-mid);
  }
  .bs:hover{transform:translateY(-3px);box-shadow:var(--shadow-soft);border-color:var(--neon)}
  .bs::before{
    content:""; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--neon),transparent);
    opacity:0; transition:var(--t-mid);
  }
  .bs:hover::before{opacity:1}
  .bs .n{
    font-size:34px; font-weight:800; color:var(--neon);
    text-shadow:0 0 14px rgba(0,255,156,.5); letter-spacing:1px;
  }
  .bs .l{font-size:10px;color:var(--txt-dim);letter-spacing:1.5px;margin-top:6px;font-weight:600;text-transform:uppercase}

  /* ============ MISC ============ */
  .src{font-size:11px;color:var(--txt-dim);margin-top:8px;line-height:1.7}

  /* ============ MOBILE RESPONSIVE ============ */
  @media (max-width:768px){
    body{padding:8px;background-size:24px 24px}
    .wrap{padding:0}

    /* HEADER mobile — title 1 dòng, sub chips scroll ngang */
    header{
      padding:12px 14px;
      flex-direction:column !important; align-items:stretch !important; gap:10px;
    }
    .title{
      font-size:17px; letter-spacing:1.5px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      display:flex; align-items:center; flex-wrap:nowrap;
    }
    .title-badge{font-size:9px;padding:2px 7px;letter-spacing:1px;flex-shrink:0}
    .sub{
      font-size:10px; gap:6px; margin-top:4px;
      overflow-x:auto; flex-wrap:nowrap !important;
      scrollbar-width:none; -webkit-overflow-scrolling:touch;
      padding-bottom:2px;
    }
    .sub::-webkit-scrollbar{display:none}
    .sub-chip{
      flex-shrink:0; font-size:9.5px; padding:3px 8px; white-space:nowrap;
    }
    /* User bar mobile — gọn lại */
    #userBar{
      width:100%; justify-content:space-between !important;
      padding-top:8px; border-top:1px dashed rgba(0,255,156,.15); margin-top:4px;
      font-size:10.5px !important;
    }
    #userBar #meTag{font-size:11px}
    #userBar a{font-size:10px !important;padding:5px 10px !important}

    /* CONTROLS bar — scroll ngang, button KHÔNG bị co lại */
    .controls{
      top:4px;
      padding:8px; gap:5px;
      overflow-x:auto; flex-wrap:nowrap;
      scrollbar-width:none; -webkit-overflow-scrolling:touch;
      align-items:center;
    }
    .controls::-webkit-scrollbar{display:none}
    .controls > *{flex-shrink:0 !important}   /* QUAN TRỌNG: không cho item shrink → tên menu đầy đủ */
    .controls button,.controls select{
      padding:9px 13px; font-size:12.5px;
      white-space:nowrap; letter-spacing:.8px;
      flex-shrink:0 !important;
    }
    .controls select{padding-right:30px;min-width:auto}
    .auto{font-size:10px;flex-shrink:0;white-space:nowrap}

    /* MATCH CARDS — gọn lại */
    .match{padding:11px 12px;margin-bottom:10px}
    .row{flex-direction:column;align-items:stretch;gap:8px}
    .row > div:last-child{
      text-align:left; display:flex; align-items:center;
      justify-content:space-between; gap:10px; margin-top:0;
    }
    .league{font-size:9.5px;letter-spacing:1px;margin-bottom:3px}
    .teams{font-size:13px;gap:8px;margin:1px 0}
    .teams img{width:20px;height:20px}
    .score{font-size:22px;font-weight:800}

    /* DONUT + flex columns */
    .flex{gap:10px;flex-direction:column}
    .col{min-width:100%;flex:1 1 100%}
    .donutbox{width:160px;height:160px;margin:0 auto}

    /* GRID stats */
    .grid2{grid-template-columns:1fr 1fr;gap:6px}
    .grid2[style*="3"]{grid-template-columns:1fr 1fr 1fr;gap:5px}
    .cell{padding:7px 9px}
    .cell .k{font-size:9px}
    .cell .v{font-size:12.5px}

    /* BIG STATS */
    .bigstat{gap:8px}
    .bs{padding:12px 8px;min-width:calc(50% - 4px)}
    .bs .n{font-size:24px}
    .bs .l{font-size:9px;letter-spacing:1px}

    /* HEATMAP */
    .heat{gap:2px;font-size:9px}
    .heat .lbl{font-size:9px}

    /* TABLES */
    table{font-size:11px}
    th,td{padding:7px 5px}
    th{font-size:9px;letter-spacing:1px}

    /* SCORES */
    .scores{gap:5px}
    .sbox{padding:5px 9px;font-size:11px;min-width:48px}
    .sbox b{font-size:13px}

    /* SCAN BUTTON */
    .scan-btn{padding:8px 14px;font-size:12px;width:100%;margin-top:8px}

    /* VERDICT */
    .verdict{padding:12px 13px}
    .verdict li{font-size:11.5px;padding:4px 0 4px 18px}
    .vh{font-size:10.5px;letter-spacing:2px}
  }

  /* Cực nhỏ — iPhone SE, viewport <420px */
  @media (max-width:420px){
    body{padding:6px}
    header{padding:10px 12px}
    .title{font-size:15px;letter-spacing:1px;gap:6px}
    .title-badge{font-size:8.5px;padding:2px 6px}
    .sub-chip{font-size:9px;padding:2px 7px}
    .donutbox{width:140px;height:140px}
    .donutc b{font-size:18px}
    .donutc span{font-size:9px}

    /* 3 KÈO CHÍNH cards — stack 1 col */
    .grid2[style*="3"]{grid-template-columns:1fr;gap:5px}
    .grid2[style*="3"] > div{padding:10px}
    .grid2[style*="3"] .v{font-size:16px}

    /* Stat grid → 1 cột để dễ đọc */
    .bigstat{flex-direction:column;gap:6px}
    .bs{min-width:100%;padding:11px 10px;display:flex;align-items:center;justify-content:space-between;text-align:left}
    .bs .n{font-size:22px}
    .bs .l{font-size:9.5px;margin-top:0}

    /* Score + button row */
    .row > div:last-child{flex-direction:column;align-items:stretch}
    .row > div:last-child .score{align-self:flex-start;font-size:20px}
    .scan-btn{width:100%}
  }

  /* ============ SCROLLBAR ============ */

<script>
// Live Server (cổng 5500) thì gọi backend 8000; còn lại (chạy local 8000 hoặc deploy lên domain) dùng chính origin.
const API=location.port==="5500"?"http://127.0.0.1:8000":location.origin;
let tab="comp", timer=null;
const code=()=>document.getElementById("comp").value;

function setTab(t){
  tab=t;
  ["comp","rank","bt","track","live","bets"].forEach(x=>document.getElementById("b-"+x)?.classList.toggle("active",x===t));
  clearInterval(timer);
  document.getElementById("auto").textContent = t==="live"?"// auto-sync 30s":"";
  if(t==="live") timer=setInterval(reload,60000);  // tự cập nhật mỗi phút
  reload();
}
function reload(){ if(tab==="comp")loadMatches(); else if(tab==="rank")loadRank();
  else if(tab==="bt")loadValidate(); else if(tab==="track")loadTrack();
  else if(tab==="live")loadLive(); else if(tab==="bets")loadBets(); }

async function getJSON(u){const r=await fetch(u);return r.json();}

async function loadMatches(){
  const v=document.getElementById("view");
  v.innerHTML='<div class="empty">[ ████░░░░ ] nạp mùa giải + fit chỉ số sức mạnh...</div>';
  try{const d=await getJSON(`${API}/api/competition?code=${code()}`);
    if(d.detail){v.innerHTML='<div class="empty err">! '+d.detail+'</div>';return;}
    if(!d.matches?.length){v.innerHTML='<div class="empty">// không có trận.</div>';return;}
    v.innerHTML=d.matches.map(m=>matchCard(m,true)).join("");
  }catch(e){v.innerHTML='<div class="empty err">! '+e+'</div>';}
}
function estMinute(dateStr){
  let e=Math.floor((Date.now()-new Date(dateStr))/60000);
  if(e>45) e-=15;                 // trừ nghỉ giữa hiệp (ước lượng)
  return Math.max(0,Math.min(e,90));
}
function lbar(label,val,win){const p=(val*100).toFixed(1);
  return `<div style="margin:4px 0"><div style="display:flex;justify-content:space-between;font-size:11px;letter-spacing:1px">
    <span>${label}</span><span>${p}%</span></div>

    <div class="${win?'bar-fill win':''}" style="height:100%;width:${p}%;background:${win?'linear-gradient(90deg,var(--neon),#7dff00)':'linear-gradient(90deg,var(--neon2),var(--neon))'}"></div></div></div>`;}

let tvId=localStorage.getItem("tvId")||"";
async function setTvId(){
  const el=document.getElementById("tvid");
  const newId=(el.value||"").trim();
  if(!newId){tvId="";localStorage.setItem("tvId","");tvRender();return;}
  // Confirm cost trước khi theo dõi (nếu chưa paid)
  const ok = await confirmCost(newId);
  if(!ok) return;
  tvId=newId; localStorage.setItem("tvId",tvId); tvRender();
}
let tvTicker=null, tvLiveTimer=null, verdictTyper=null;
function typeVerdict(scope){
  clearTimeout(verdictTyper);
  const root=scope||document;
  const lis=[...root.querySelectorAll(".verdict li")];
  if(!lis.length)return;
  const texts=lis.map(li=>li.textContent);
  lis.forEach(li=>li.textContent="");
  let li=0,ci=0;
  const step=()=>{
    if(li>=lis.length)return;
    const t=texts[li];
    if(ci<=t.length){
      lis[li].textContent=t.slice(0,ci)+(ci<t.length?"▋":"");
      ci++; verdictTyper=setTimeout(step,11);
    }else{ lis[li].textContent=t; li++; ci=0; verdictTyper=setTimeout(step,110); }
  };
  step();
}
const ANA_MSGS=["⟳ Đồng bộ dữ liệu trực tiếp...",
  "⟳ Cập nhật tỉ số & phút thi đấu thật...","⟳ Dựng ma trận Dixon-Coles tỉ số cuối...",
  "⟳ Mô phỏng Monte Carlo 10.000 kịch bản...","⟳ Quét kèo 1×2 / Tài-Xỉu / chấp châu Á...",
  "⟳ Phân tích phạt góc, thẻ, đà trận...","⟳ Tổng hợp xác suất từ nhiều mô hình..."];
function startTicker(){
  clearInterval(tvTicker);let i=0;
  const tick=()=>{const e=document.getElementById("ana-ticker");if(!e)return;
    if(i%ANA_MSGS.length===0){const t=new Date().toLocaleTimeString('vi');e.innerHTML='<span style="color:var(--neon2)">✓ cập nhật lúc '+t+'</span>';}
    else e.textContent=ANA_MSGS[i%ANA_MSGS.length];i++;};
  tick();tvTicker=setInterval(tick,1300);
}

// ===== TRACKING PICKS UI =====
function renderPicksTracking(d){
  const pt = d.picks_tracking;
  if(!pt) return '';
  const STATUS_COLORS = {neon:'var(--neon)', bad:'var(--bad)', warn:'var(--warn)', dim:'var(--dim)'};
  // ⚠ THỨ TỰ THAM SỐ: title, pre, current, livePick, status
  const card = (title, pre, current, livePick, status) => {
    const c = status?.color || 'dim';
    const rgb = c==='neon'?'0,255,156':c==='bad'?'255,59,92':c==='warn'?'255,176,0':'63,107,90';
    return `
    <div class="cell" style="padding:12px;display:flex;flex-direction:column;gap:6px">
      <div class="k" style="font-size:10.5px;color:var(--warn);letter-spacing:1.5px">${title}</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
        <span style="font-size:10px;color:var(--dim)">🎯 PRE-MATCH</span>
        <span style="color:var(--neon);font-weight:800;font-size:12px">${pre||'—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
        <span style="font-size:10px;color:var(--dim)">📊 HIỆN TẠI</span>
        <span style="color:var(--neon2);font-weight:700;font-size:12px">${current||'—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-top:1px dashed rgba(0,255,156,.15);padding-top:6px;margin-top:2px">
        <span style="font-size:10px;color:var(--dim)">🔄 UPDATE</span>
        <span style="color:var(--neon2);font-weight:700;font-size:12px">${livePick||'—'}</span>
      </div>
      <div style="background:rgba(${rgb},.12);border:1px solid rgba(${rgb},.4);border-radius:5px;padding:5px 9px;margin-top:4px">
        <div style="font-weight:800;font-size:13px;color:${STATUS_COLORS[c]||'var(--txt)'}">${status?.label||''}</div>
        <div style="font-size:10.5px;color:var(--txt-dim);margin-top:2px;line-height:1.4">${status?.hint||''}</div>
      </div>
    </div>`;
  };

  const c = pt.corner, ah = pt.ah, ou = pt.ou;
  const cornerCard = card(
    `🚩 KÈO GÓC T/X ${c.pre_match.line}`,
    `${c.pre_match.side} (model ${(c.pre_match.prob*100).toFixed(0)}%)`,
    `${c.current.actual} góc · phút ${c.current.minute}'`,
    `T/X ${c.live_pick.line} → ${c.live_pick.pick} (kỳ vọng ${c.live_pick.exp_corners})`,
    c.status,
  );
  const ahSideLabel = ah.pre_match.side === 'NHÀ' ? 'NHÀ' : 'KHÁCH';
  const liveAH = pt.ah.live_pick;
  const liveAHSide = liveAH.team || (liveAH.side === 'home' ? 'NHÀ' : 'KHÁCH');
  const ahCard = card(
    `⚖ CƯỢC CHẤP`,
    `${ahSideLabel} chấp ${ah.pre_match.line>=0?'+':''}${ah.pre_match.line}`,
    `Tỉ số ${ah.current.score} · phút ${ah.current.minute}'`,
    `${liveAHSide} chấp ${liveAH.line>=0?'+':''}${liveAH.line} · ${(liveAH.cover*100).toFixed(0)}%`,
    ah.status,
  );
  const ouCard = card(
    `🎯 TÀI/XỈU ${ou.pre_match.line}`,
    `${ou.pre_match.side} (model ${(ou.pre_match.prob*100).toFixed(0)}%)`,
    `${ou.current.actual} bàn · phút ${ou.current.minute}'`,
    `T/X ${ou.live_pick.line} → ${ou.live_pick.side} (${(ou.live_pick.prob*100).toFixed(0)}%)`,
    ou.status,
  );

  return `<div class="match" style="margin-top:10px;border-left-color:var(--warn)">
    <div class="vh" style="color:var(--warn)">▌ 🎯 TRACKING PICKS — đối chiếu pre-match vs thực tế</div>
    <div class="grid2" style="grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
      ${cornerCard}${ahCard}${ouCard}
    </div>
    <div class="src" style="margin-top:8px;font-size:11px">
      🎯 Pre-match: pick ban đầu trước trận · 📊 Hiện tại: data thực · 🔄 Update: pick mới với data live · ✓/✗ Trạng thái
    </div>
  </div>`;
}

function renderRealOdds(d){
  const o=d.real_odds;const box=document.getElementById("tvreport");if(!box)return;
  if(!o||((!o.h2h||!o.h2h.length)&&(!o.ah||!o.ah.length)&&(!o.ou||!o.ou.length))){return;}
  const f=v=>v?Number(v).toFixed(2):'-';
  const h2h=(o.h2h&&o.h2h.length)?`<div class="vh">▌ 1×2 THẬT</div><table><thead><tr><th class="name" style="text-align:left">Nhà cái</th><th>Nhà</th><th>Hòa</th><th>Khách</th></tr></thead><tbody>
    ${o.h2h.map(r=>`<tr><td class="name">${r.book}</td><td class="rk">${f(r.home)}</td><td>${f(r.draw)}</td><td class="rk">${f(r.away)}</td></tr>`).join("")}</tbody></table>`:'';
  const ah=o.ah&&o.ah.length?`<div class="vh" style="margin-top:8px">▌ KÈO CHẤP THẬT</div><table><thead><tr><th class="name" style="text-align:left">Nhà cái</th><th>Mức</th><th>Nhà</th><th>Khách</th></tr></thead><tbody>
    ${o.ah.map(r=>`<tr><td class="name">${r.book}</td><td class="rk">${r.line||''}</td><td>${f(r.home)}</td><td>${f(r.away)}</td></tr>`).join("")}</tbody></table>`:'';
  const ou=o.ou&&o.ou.length?`<div class="vh" style="margin-top:8px">▌ TÀI/XỈU THẬT</div><table><thead><tr><th class="name" style="text-align:left">Nhà cái</th><th>Mức</th><th>Tài</th><th>Xỉu</th></tr></thead><tbody>
    ${o.ou.map(r=>`<tr><td class="name">${r.book}</td><td class="rk">${r.line||''}</td><td>${f(r.over)}</td><td>${f(r.under)}</td></tr>`).join("")}</tbody></table>`:'';
  const nb=Math.max((o.h2h||[]).length,(o.ah||[]).length,(o.ou||[]).length);
  const wrap=document.createElement("div");wrap.className="match";wrap.style.marginTop="10px";wrap.style.borderLeftColor="var(--neon2)";
  wrap.innerHTML=`<div class="vh" style="color:var(--neon2)">▌ KÈO THẬT TỪ NHÀ CÁI — ${nb} công ty (tỉ lệ thập phân)</div>${h2h}${ah}${ou}
    <div class="src">Đây là tỉ lệ THẬT lấy trực tiếp từ ${o.n_books} nhà cái qua API. ${d.value?'Đã khử biên + blend vào dự đoán trước trận.':'Trận đang đá → dự đoán dùng mô hình in-play; kèo này là kèo trước trận để tham khảo.'}</div>`;
  box.appendChild(wrap);
}

async function tvRender(){
  const box=document.getElementById("tvpanel");if(!box)return;
  clearTimeout(tvLiveTimer);
  if(!tvId){clearInterval(tvTicker);box.innerHTML='<div class="src">// chọn một trận bên dưới (bấm PHÂN TÍCH) hoặc nhập ID rồi bấm THEO DÕI.</div>';return;}
  if(!box.querySelector("#tvreport")) box.innerHTML='<div class="src">[ ████░░░░ ] đang phân tích trực tiếp...</div>';
  try{
    const r=await fetch(`${API}/api/tv_live/${tvId}`);
    if(r.status===402){
      const d=await r.json();
      box.innerHTML='<div class="src err">! '+(d.detail||'Thiếu điểm để xem phân tích')+' — liên hệ ADMIN nạp thêm</div>';
      clearInterval(tvTicker);
      // Reset tvId để không tự load lại
      tvId=''; localStorage.setItem("tvId",'');
      return;
    }
    const d=await r.json();
    if(d.detail){box.innerHTML='<div class="src err">! '+d.detail+'</div>';clearInterval(tvTicker);return;}
    // Refresh điểm (vì có thể vừa trừ)
    loadMe();
    const fin=["FT","AET","PEN"].includes((d.status||'').toUpperCase());
    box.innerHTML=`
      <div class="row"><div>
        <div class="league">${d.league} · ${d.status_long} · <span style="color:var(--bad)">${fin?'KẾT THÚC':'phút '+d.minute+"'"}</span></div>
        <div class="teams" style="font-size:16px">${d.home.name}</div>
        <div class="teams" style="font-size:16px">${d.away.name}</div>
      </div><div class="score" style="font-size:24px">${d.score.home??0} : ${d.score.away??0}</div></div>
      <div class="grid2" style="margin:6px 0">
        <div class="cell"><div class="k">PHẠT GÓC</div><div class="v">${(d.total_corners>0)?(d.corners.home+'-'+d.corners.away+' (tổng '+d.total_corners+')'):'<span style="color:var(--dim);font-size:11px">⚠ Giải nhỏ — API không có dữ liệu</span>'}</div></div>
        <div class="cell"><div class="k">THẺ</div><div class="v">${(d.cards.home_yellow+d.cards.away_yellow+d.cards.home_red+d.cards.away_red>0)?(d.cards.home_yellow+d.cards.away_yellow+'🟨 '+(d.cards.home_red+d.cards.away_red)+'🟥'):'<span style="color:var(--dim);font-size:11px">⚠ Không có dữ liệu</span>'}</div></div>
      </div>
      ${(!d.real_odds || !d.real_odds.n_books) ? '<div class="src" style="background:rgba(255,176,0,.08);border:1px solid rgba(255,176,0,.3);padding:8px 12px;border-radius:6px;margin:8px 0;color:var(--warn);font-size:11.5px">⚠ <b>Giải nhỏ:</b> '+(d.league||'')+' — không có data chi tiết cho trận này. Thử <b>fixture giải lớn</b> (J1 League, Premier League, La Liga, Champions League, World Cup, Friendlies)</div>' : ''}
      <div id="ana-ticker" class="term" style="font-size:11px;min-height:15px;margin:4px 0"></div>
      ${renderPicksTracking(d)}
      <div id="tvreport"></div>`;
    renderReport(document.getElementById("tvreport"),d);
    renderRealOdds(d);
    if(fin){clearInterval(tvTicker);const e=document.getElementById("ana-ticker");if(e)e.innerHTML='<span style="color:var(--dim)">// trận đã kết thúc — dừng phân tích trực tiếp.</span>';}
    else{startTicker();tvLiveTimer=setTimeout(tvRender,20000);}  // tự phân tích lại mỗi 20s
  }catch(e){box.innerHTML='<div class="src err">! '+e+'</div>';}
}

async function pickTv(id){
  const ok = await confirmCost(id);
  if(!ok) return;
  const el=document.getElementById("tvid");
  if(el) el.value=id;
  tvId=String(id); localStorage.setItem("tvId",tvId);
  tvRender();
  window.scrollTo({top:0,behavior:'smooth'});
}
const LIVE_S=["1H","2H","HT","ET","BT","P","LIVE","INT","SUSP"];
const DONE_S=["FT","AET","PEN","AWD","WO"];
function phase(m){const s=(m.status||'').toUpperCase();
  if(LIVE_S.includes(s)||(m.minute>0&&!DONE_S.includes(s)))return 0;
  if(DONE_S.includes(s))return 2; return 1;}
function statusBadge(m){const p=phase(m);
  if(p===0)return `<span style="color:var(--bad)">● ${m.minute?m.minute+"'":"LIVE"}</span>`;
  if(p===2)return `<span style="color:var(--dim)">kết thúc</span>`;
  return `<span style="color:var(--neon2)">${new Date(m.date).toLocaleString('vi',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}</span>`;}

// Danh sách giải lớn có data đầy đủ (corners + cards + odds 10+ bookmakers)
const BIG_LEAGUE_KEYWORDS = [
  'premier league','la liga','primera division','serie a','bundesliga','ligue 1',
  'champions league','europa league','conference league','europa conference',
  'world cup','euro','copa america','africa cup','asian cup','nations league',
  'j1 league','j-league','k league','k-league','a-league','mls','primeira',
  'eredivisie','championship','cup','friendlies','international friendly',
];
function isBigLeague(name){
  const n = (name||'').toLowerCase();
  return BIG_LEAGUE_KEYWORDS.some(k => n.includes(k));
}

async function tvLoadList(live){
  const box=document.getElementById("tvlist");if(!box)return;
  box.innerHTML='<div class="src">đang tải danh sách trận...</div>';
  try{const d=await getJSON(`${API}/api/tv_matches?${live?'live=true':'date='+new Date().toISOString().slice(0,10)}`);
    if(d.detail){box.innerHTML='<div class="src err">! '+d.detail+'</div>';return;}
    if(!d.matches?.length){box.innerHTML='<div class="src">// không có trận '+(live?'đang đá':'hôm nay')+'.</div>';return;}
    // Sort: giải lớn lên đầu, sau đó theo phase + date
    const ms=d.matches.slice().sort((a,b) => {
      const ba = isBigLeague(a.league) ? 0 : 1;
      const bb = isBigLeague(b.league) ? 0 : 1;
      if(ba !== bb) return ba - bb;
      return phase(a) - phase(b) || (a.date||'').localeCompare(b.date||'');
    });
    const bigCount = ms.filter(m=>isBigLeague(m.league)).length;

// Cost deterministic — phải khớp với backend match_cost()
function clientMatchCost(fid){
  const h = (Number(fid) * 2654435761) >>> 0;   // unsigned 32-bit
  return 5 + (h % 16);
}
function matchCard(m,useCode){
  const gh=m.goals.home??"–",ga=m.goals.away??"–";
  const cArg=useCode?`'${code()}'`:"null";
  const cost = clientMatchCost(m.fixture_id);
  const costTag = (window._me && window._me.role==='admin')
    ? '<span style="font-size:9px;color:var(--neon3)">FREE</span>'
    : `<span style="font-size:9px;color:var(--neon2)">−${cost}đ</span>`;
  return `<div class="match" id="m-${m.fixture_id}">
    <div class="row"><div>
      <div class="league">${m.league} · ${m.status}</div>
      <div class="teams">${m.home.logo?`<img src="${m.home.logo}" onerror="this.style.display='none'">`:''}${m.home.name}</div>
      <div class="teams">${m.away.logo?`<img src="${m.away.logo}" onerror="this.style.display='none'">`:''}${m.away.name}</div>
    </div><div style="text-align:right">
      <div class="score">${gh} : ${ga}</div>
      <button class="scan-btn" onclick="scan(${m.fixture_id},${m.home.id},${m.away.id},${cArg})">PHÂN TÍCH ${costTag}</button>
    </div></div>
    <div class="panel" id="p-${m.fixture_id}"><div class="term" id="t-${m.fixture_id}"></div></div></div>`;
}

const BOOT=["[OK] nạp chỉ số sức mạnh mùa giải","[..] dựng ma trận Dixon-Coles",
  "[..] mô phỏng Monte Carlo 10.000 trận","[..] chạy mô hình ML softmax",
  "[..] đối chiếu lịch sử đối đầu","[OK] tổng hợp nhận định >>"];

// ===== PAYWALL: kiểm tra cost trận + confirm trừ điểm =====
async function confirmCost(fid){
  try{
    const r = await fetch(`${API}/api/match_cost/${fid}`);
    if(!r.ok) return true;   // không có info → cho phép, server sẽ check
    const d = await r.json();
    if(d.is_admin || d.paid) return true;   // admin free, đã mua → free
    if(d.points < d.cost){
      alert(`⚠ Không đủ điểm!\n\nTrận này tốn ${d.cost}đ, bạn chỉ có ${d.points}đ.\nLiên hệ ADMIN để nạp thêm điểm.`);
      return false;
    }
    return confirm(`💎 Xem phân tích trận này sẽ trừ ${d.cost}đ điểm.\nBạn còn ${d.points}đ (sau khi trừ: ${d.points-d.cost}đ).\n\nTiếp tục?`);
  }catch(e){ return true; }
}

async function scan(fid,hid,aid,c){
  // Bước 1: confirm cost
  const okToPay = await confirmCost(fid);
  if(!okToPay) return;

  const panel=document.getElementById("p-"+fid),term=document.getElementById("t-"+fid);
  panel.style.display="block";term.textContent="";panel.querySelector('.report')?.remove();
  let i=0;const tp=setInterval(()=>{term.textContent+=BOOT[i]+"\n";if(++i>=BOOT.length)clearInterval(tp);},200);
  try{
    let u=`${API}/api/predict/${fid}?home_id=${hid}&away_id=${aid}`;
    if(c)u+=`&code=${c}`;
    const r=await fetch(u);
    if(r.status===402){
      clearInterval(tp);
      const d=await r.json();
      term.innerHTML='<span class="err">! '+(d.detail||'Thiếu điểm')+'</span>';
      return;
    }
    const d=await r.json();
    setTimeout(()=>{clearInterval(tp);
      if(d.detail){term.innerHTML='<span class="err">! '+d.detail+'</span>';return;}
      term.textContent="";renderReport(panel,d);
      // Refresh điểm sau khi mua
      loadMe();
    },1200);
  }catch(e){clearInterval(tp);term.innerHTML='<span class="err">! '+e+'</span>';}
}

function donut(cv,p){
  new Chart(cv,{type:"doughnut",data:{labels:["Nhà","Hòa","Khách"],
    datasets:[{data:[p.home,p.draw,p.away],backgroundColor:["#00ff9c","#ffb000","#00e0ff"],borderColor:"#05070a",borderWidth:2}]},
    options:{cutout:"68%",plugins:{legend:{display:false}},animation:{animateRotate:true,duration:700}}});
}
function tierTag(t){const c=(t==="RẤT CAO"||t==="CAO")?"t-hi":t==="TRUNG BÌNH"?"t-mid":"t-lo";return `<span class="tag ${c}">${t}</span>`;}

function marketBlock(d){
  const mp=d.sources.market;
  if(!mp){
    return `<div class="match" style="margin-top:10px"><div class="src">
      ⚠ KÈO THẬT: chưa lấy được — đang dùng <b style="color:var(--warn)">100% xác suất mô hình</b>.</div></div>`;
  }
  // Tính odd trung bình từ real_odds.h2h (10+ bookmakers)
  const realH2H = (d.real_odds && d.real_odds.h2h) || [];
  const avgOdds = {home: 0, draw: 0, away: 0};
  if(realH2H.length){
    for(const r of realH2H){
      avgOdds.home += r.home||0; avgOdds.draw += r.draw||0; avgOdds.away += r.away||0;
    }
    avgOdds.home = (avgOdds.home/realH2H.length).toFixed(2);
    avgOdds.draw = (avgOdds.draw/realH2H.length).toFixed(2);
    avgOdds.away = (avgOdds.away/realH2H.length).toFixed(2);
  }
  const od=d.market_odds||{},raw=od.odds||{},val=d.value;
  const cell=(k,nm)=>{
    let vline="";
    if(val){const v=val[k];const vc=v>0.05?'var(--neon)':v<-0.05?'var(--bad)':'var(--dim)';
      vline=`<div style="font-size:10px;color:${vc}">value ${v>=0?'+':''}${(v*100).toFixed(1)}%</div>`;}
    const oddVal = raw[k] || avgOdds[k] || '-';
    return `<div class="cell"><div class="k">${nm}</div>
      <div class="v">${(mp[k]*100).toFixed(0)}% <span style="font-size:10px;color:var(--neon2)">@${oddVal}</span></div>${vline}</div>`;};
  const wpct=d.model_informed?55:90;
  const bookLabel = realH2H.length
    ? `<b style="color:var(--neon)">${realH2H.length} nhà cái</b> đồng thuận (TB)`
    : (od.bookmaker||'nhà cái');
  const foot=val
    ? `value dương = model nghĩ cao hơn nhà cái (có thể có giá trị, vẫn rủi ro). value âm = nhà cái đánh giá cao hơn.`
    : `⚠ Giải này model THIẾU dữ liệu phong độ → ưu tiên kèo nhà cái (${wpct}%) và <b style="color:var(--warn)">ẩn value</b> vì lúc này value vô nghĩa. Hãy tin cột % kèo nhà cái ở trên.`;
  return `<div class="match" style="margin-top:10px;border-left-color:var(--neon2)">
    <div class="vh" style="color:var(--neon2)">▌ KÈO THẬT — ${bookLabel} (đã khử biên, blend ${wpct}% vào kết quả)</div>
    <div class="grid2" style="grid-template-columns:1fr 1fr 1fr">
      ${cell("home","NHÀ")}${cell("draw","HÒA")}${cell("away","KHÁCH")}</div>
    <div class="src">${foot}</div>
  </div>`;
}

function betBlock(mk){
  if(!mk.over_under) return "";
  const ou=mk.over_under, ah=mk.handicap, op=mk.ou_pick, ap=mk.ah_pick;
  const ouRows=Object.keys(ou).map(L=>{const v=ou[L];const hi=v.over>=v.under;
    return `<tr><td class="name">Tổng > ${L}</td>

      <td style="color:${!hi?'var(--neon)':'var(--dim)'}">${(v.under*100).toFixed(0)}%</td></tr>`;}).join("");
  const ahRows=Object.keys(ah).sort((a,b)=>parseFloat(a)-parseFloat(b)).map(L=>{const v=ah[L];
    return `<tr><td class="name">Nhà ${L}</td><td class="rk">${(v.home*100).toFixed(0)}%</td>
      <td style="color:var(--dim)">${(v.push*100).toFixed(0)}%</td><td>${(v.away*100).toFixed(0)}%</td></tr>`;}).join("");
  return `<div class="flex" style="margin-top:10px">

      <table><thead><tr><th class="name" style="text-align:left">Mức</th><th>TÀI</th><th>XỈU</th></tr></thead><tbody>${ouRows}</tbody></table>
      <div class="src">→ Gợi ý: <span class="hot">${op.side} ${op.line} · ${(op.prob*100).toFixed(1)}%</span></div>
    </div>
    <div class="col"><div class="vh">▌ KÈO CHẤP (Asian Handicap)</div>
      <table><thead><tr><th class="name" style="text-align:left">Mức (đội nhà)</th><th>Nhà</th><th>Hòa vốn</th><th>Khách</th></tr></thead><tbody>${ahRows}</tbody></table>
      <div class="src">→ Gợi ý: <span class="hot">${ap.team} chấp ${ap.line>=0?'+':''}${ap.line} · ${(ap.cover*100).toFixed(1)}%</span></div>
    </div></div>`;
}
function heat(grid){
  let h='<div class="heat"><div class="lbl"></div>';
  for(let j=0;j<6;j++)h+=`<div class="lbl">K${j}</div>`;
  const flat = (grid||[]).flat();
  const mx = flat.length ? Math.max(...flat) : 0;
  // Empty data → show message
  if(mx <= 0){
    return '<div class="heat"></div><div class="src" style="text-align:center;padding:20px;color:var(--dim);font-size:11px">⚠ Trận đã kết thúc — không có ma trận xác suất</div>';
  }
  for(let i=0;i<6;i++){h+=`<div class="lbl">N${i}</div>`;
    for(let j=0;j<6;j++){const v=(grid[i]&&grid[i][j])||0,a=v/mx;
      h+=`<div class="hc" style="background:rgba(0,255,156,${(0.08+a*0.92).toFixed(2)})" title="${i}-${j}: ${(v*100).toFixed(1)}%">${v>=0.04?(v*100).toFixed(0):""}</div>`;}}
  return h+'</div>';
}

      ${card("TÀI/XỈU "+ou.line,ou.side,"bàn thắng",ou.prob,saveBtn('ou',ou.side.toLowerCase(),ou.line,ou.prob))}

}

// Helper: lấy home/away/league từ DOM match card, gọi quickAddBet
function quickAddFromReport(fid, betType, pick, line, suggestedOdd){
  const card = document.getElementById('m-'+fid) || document.getElementById('tvpanel');
  let home = '', away = '', league = '';
  if(card){
    const teams = card.querySelectorAll('.teams');
    home = teams[0]?.textContent.trim() || '';
    away = teams[1]?.textContent.trim() || '';
    const lg = card.querySelector('.league');
    if(lg) league = lg.textContent.split('·')[0].trim();
  }
  // Fallback nếu tab LIVE (cấu trúc khác)
  if(!home){
    home = prompt('Tên đội nhà:','') || '';
    away = prompt('Tên đội khách:','') || '';
  }
  if(!home || !away){ alert('Thiếu tên đội — hủy'); return; }
  quickAddBet(fid, home, away, league, betType, pick, line, suggestedOdd);
}

        <div class="bs"><div class="n" style="color:var(--neon2)">${base}%</div><div class="l">ĐOÁN MÒ (baseline)</div></div>
        <div class="bs"><div class="n" style="color:${edge>=0?'var(--neon)':'var(--bad)'}">${edge>=0?'+':''}${edge.toFixed(1)}%</div><div class="l">LỢI THẾ THẬT</div></div>
        <div class="bs"><div class="n" style="color:var(--warn)">${d.logloss}</div><div class="l">LOG-LOSS (thấp = tốt)</div></div>
      </div>
      <div class="match">
        <div class="vh">▌ ĐƯỜNG HIỆU CHUẨN (CALIBRATION) — điểm nằm trên đường chéo = model trung thực</div>
        <div style="max-width:420px;margin:auto"><canvas id="calib"></canvas></div>
        <div class="src">Trục X: model nói bao nhiêu % · Trục Y: thực tế xảy ra bao nhiêu %. Sát đường chéo nghĩa là khi nói 60% thì đúng ~60%.</div>
      </div>
      <div class="match"><div class="src">// ${d.method}<br>// SO VỚI NHÀ CÁI: ${d.market.note}</div></div>`;
    const pts=d.calibration.map(c=>({x:c.pred*100,y:c.obs*100,r:Math.min(3+c.count/15,12)}));
    new Chart(document.getElementById("calib"),{
      data:{datasets:[
        {type:"line",label:"lý tưởng",data:[{x:0,y:0},{x:100,y:100}],borderColor:"#3f6b5a",borderDash:[5,5],pointRadius:0,borderWidth:1},
        {type:"bubble",label:"model",data:pts,backgroundColor:"rgba(0,255,156,.6)",borderColor:"#00ff9c"}
      ]},
      options:{scales:{x:{min:0,max:100,title:{display:true,text:"Dự đoán %",color:"#3f6b5a"},ticks:{color:"#3f6b5a"},grid:{color:"rgba(0,255,156,.08)"}},
        y:{min:0,max:100,title:{display:true,text:"Thực tế %",color:"#3f6b5a"},ticks:{color:"#3f6b5a"},grid:{color:"rgba(0,255,156,.08)"}}},
        plugins:{legend:{labels:{color:"#b8ffe0"}}}}});
  }catch(e){v.innerHTML='<div class="empty err">! '+e+'</div>';}
}

async function loadTrack(){
  const v=document.getElementById("view");
  v.innerHTML='<div class="empty">[ ▣ ] đối chiếu sổ kèo với kết quả thật...</div>';
  try{const d=await getJSON(`${API}/api/track`);
    const s=d.stats;
    const accTxt=s.accuracy!=null?(s.accuracy*100).toFixed(1)+"%":"—";
    const tierRows=Object.entries(s.by_tier||{}).map(([k,b])=>
      `<tr><td class="name">${k}</td><td>${b.correct}</td><td>${b.total}</td><td class="rk">${(b.rate*100).toFixed(1)}%</td></tr>`).join("");
    const rows=d.recent.map(r=>{
      const res=r.result?`${r.result.score} (${{home:'Nhà',draw:'Hòa',away:'Khách'}[r.result.outcome]})`:'<span style="color:var(--dim)">chờ...</span>';
      const ok=r.correct===true?'<span style="color:var(--neon)">✓</span>':r.correct===false?'<span style="color:var(--bad)">✗</span>':'';
      const pk={home:'Nhà',draw:'Hòa',away:'Khách'}[r.pick];
      return `<tr><td class="name">${r.home} vs ${r.away}</td><td>${pk} ${(r.confidence*100).toFixed(0)}%</td><td>${res}</td><td>${ok}</td></tr>`;
    }).join("");
    v.innerHTML=`
      <div class="bigstat">
        <div class="bs"><div class="n">${accTxt}</div><div class="l">TỈ LỆ TRÚNG TÍCH LŨY</div></div>
        <div class="bs"><div class="n" style="color:var(--neon2)">${s.resolved}</div><div class="l">ĐÃ CÓ KẾT QUẢ</div></div>
        <div class="bs"><div class="n" style="color:var(--warn)">${s.pending}</div><div class="l">ĐANG CHỜ ĐÁ</div></div>
        <div class="bs"><div class="n">${s.total_logged}</div><div class="l">TỔNG ĐÃ GHI</div></div>
      </div>
      ${tierRows?`<div class="match"><div class="vh">▌ TỈ LỆ TRÚNG THEO MỨC TỰ TIN</div>
        <table><thead><tr><th class="name" style="text-align:left">Mức</th><th>Đúng</th><th>Tổng</th><th>Tỉ lệ</th></tr></thead><tbody>${tierRows}</tbody></table></div>`:""}
      <div class="match"><div class="vh">▌ NHẬT KÝ DỰ ĐOÁN (mới nhất)</div>
        ${d.recent.length?`<table><thead><tr><th class="name" style="text-align:left">Trận</th><th>Dự đoán</th><th>Kết quả</th><th>✓/✗</th></tr></thead><tbody>${rows}</tbody></table>`
        :'<div class="src">// chưa có dự đoán nào được ghi. Hãy vào tab TRẬN ĐẤU và bấm PHÂN TÍCH các trận SẮP ĐÁ — chúng sẽ tự được ghi vào sổ và đối chiếu khi đá xong.</div>'}</div>
      <div class="src">// sổ này lưu vĩnh viễn (backend/track_log.json), không sửa hồi tố — đối chiếu tự động khi trận kết thúc. Đây mới là bằng chứng độ tin cậy thật theo thời gian.</div>`;
  }catch(e){v.innerHTML='<div class="empty err">! '+e+'</div>';}
}

const BET_TYPE_LABELS = {"1x2":"1x2","hdp":"Kèo chấp","ou":"Tài/Xỉu","btts":"2 đội ghi bàn","corner":"Phạt góc"};
const PICK_LABELS = {"home":"Đội nhà","draw":"Hoà","away":"Đội khách","over":"Tài","under":"Xỉu","yes":"Có","no":"Không"};
const STATUS_LABELS = {"pending":"⏳ Chờ","won":"✓ Thắng","lost":"✗ Thua","push":"= Hoà vốn","half_won":"½ Thắng","half_lost":"½ Thua"};
const STATUS_COLORS = {"pending":"var(--warn)","won":"var(--neon)","lost":"var(--bad)","push":"var(--dim)","half_won":"var(--neon2)","half_lost":"#ff8a85"};

function fmtMoney(n){
  const s = n.toLocaleString('vi-VN', {maximumFractionDigits:0});
  return n >= 0 ? '+'+s : s;
}
function fmtDate(ts){
  if(!ts) return '—';
  return new Date(ts*1000).toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

      <div class="match">
        <div class="vh">▌ DANH SÁCH CƯỢC</div>

          </tbody>
        </table>
      </div>` : '';

    v.innerHTML = bankroll + stats + chart + form + table + byLeague;

    // Render chart sau khi DOM ready
    if(points.length && window.Chart){
      const ctx = document.getElementById('profitChart');
      if(ctx){
        new Chart(ctx, {
          type:'line',
          data:{
            labels: points.map(p=>p.date),
            datasets:[{

            },
            plugins:{legend:{labels:{color:'#b8ffe0'}}},
          },
        });
      }
    }
  }catch(e){
    v.innerHTML='<div class="empty err">! '+e+'</div>';
  }
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

    odd: document.getElementById('bf-odd').value.trim(),
    note: document.getElementById('bf-note').value.trim(),
  };
  const msg = document.getElementById('bf-msg');
  try{
    const r = await fetch(API+'/api/bets/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const j = await r.json();
    if(j.ok){
      msg.innerHTML = '<span style="color:var(--neon)">✓ '+j.msg+'</span>';
      // Clear form
      ['bf-home','bf-away','bf-league','bf-fixture','bf-line','bf-stake','bf-odd','bf-note'].forEach(id=>document.getElementById(id).value='');
      setTimeout(loadBets, 800);
    }else{
      msg.innerHTML = '<span style="color:var(--bad)">✗ '+j.msg+'</span>';
    }
  }catch(e){ msg.innerHTML='<span style="color:var(--bad)">✗ '+e+'</span>'; }
}

async function settleBet(id, status){
  if(!status) return;
  const fd = new FormData(); fd.append('status', status);
  await fetch(API+`/api/bets/${id}/settle`,{method:'POST',body:fd});
  loadBets();
}
async function deleteBet(id){
  if(!confirm('Xóa cược này?')) return;
  await fetch(API+`/api/bets/${id}/delete`,{method:'POST'});
  loadBets();
}

async function setBankroll(){
  const v = document.getElementById('brInput').value;
  if(!v || isNaN(parseFloat(v))){ alert('Nhập số hợp lệ'); return; }
  const fd = new FormData(); fd.append('value', v);
  const r = await fetch(API+'/api/bets/bankroll',{method:'POST',body:fd});
  const j = await r.json();
  if(j.ok){ alert('✓ '+j.msg); loadBets(); }
  else alert('✗ '+(j.msg||'Lỗi'));
}

function exportBets(){
  // Mở URL → browser tự download CSV
  window.location.href = API+'/api/bets/export';
}

async function autoSettleBets(){
  if(!confirm('Auto-settle các cược pending có Fixture ID? Sẽ đối chiếu với kết quả thật từ API.')) return;
  const r = await fetch(API+'/api/bets/auto_settle',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  const j = await r.json();
  alert((j.ok?'✓ ':'✗ ')+ j.msg + ` (kiểm tra ${j.checked||0} fixtures, settle ${(j.updated||[]).length} cược)`);
  loadBets();
}

// ===== Quick add từ AI prediction =====
async function quickAddBet(fixtureId, home, away, league, betType, pick, line, suggestedOdd){
  // Pre-fill form bằng prompt nhanh
  const odd = prompt(`Lưu cược ${home} vs ${away}\n${betType.toUpperCase()} - ${pick}${line!==null?' '+line:''}\n\nOdd thực tế (decimal):`, suggestedOdd||'1.95');
  if(!odd || isNaN(parseFloat(odd)) || parseFloat(odd) <= 1) return;
  const stake = prompt(`Stake (số tiền đặt):`, '100');
  if(!stake || isNaN(parseFloat(stake)) || parseFloat(stake) <= 0) return;
  const data = {
    fixture_id: fixtureId, home_team: home, away_team: away, league,
    bet_type: betType, pick: pick, line: line,
    stake: parseFloat(stake), odd: parseFloat(odd),
    note: 'Lưu từ phân tích AI',
  };
  const r = await fetch(API+'/api/bets/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  const j = await r.json();
  if(j.ok){
    alert('✓ Đã lưu vào sổ cược! Vào tab "📒 SỔ CƯỢC" để xem.');
  }else{
    alert('✗ '+(j.msg||'Lỗi'));
  }
}

// Load current user info: username + role + points
async function loadMe(){
  try{
    const r = await fetch(API+"/api/me");
    if(!r.ok) return;
    const u = await r.json();
    window._me = u;
    const tag = document.getElementById("meTag");
    if(tag) tag.textContent = "👤 " + u.username + " · " + u.role.toUpperCase();
    if(u.role === "admin"){
      const a = document.getElementById("adminLink");
      if(a) a.style.display = "inline-block";
      // Admin xem free → ẩn điểm (vẫn để hiện balance nếu muốn)
      const ptsTag = document.getElementById("ptsTag");
      if(ptsTag){
        ptsTag.style.display = "inline-block";
        document.getElementById("ptsValue").textContent = "∞ FREE";
      }
    }else{
      const ptsTag = document.getElementById("ptsTag");
      if(ptsTag){
        ptsTag.style.display = "inline-block";
        const v = document.getElementById("ptsValue");
        if(v){
          v.textContent = u.points;
          // Highlight nếu < 20đ
          ptsTag.style.borderColor = u.points < 20 ? 'rgba(255,59,92,.5)' : 'rgba(0,224,255,.4)';
          ptsTag.style.color = u.points < 20 ? 'var(--bad)' : 'var(--neon2)';
        }
      }
    }
  }catch(e){}
}
loadMe();

setTab("live");
</script>
