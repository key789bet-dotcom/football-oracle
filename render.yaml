services:
  - type: web
    name: football-oracle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATA_PROVIDER
        value: footballdata
      - key: FOOTBALLDATA_TOKEN
        sync: false      # tự nhập trong dashboard (bí mật)
      - key: ODDS_API_KEY
        sync: false
